---
- hosts: test
  become: yes

  tasks:

    - name: Install Apache server
      yum:
        name: httpd
        state: present

    - name: Start Apache server
      service:
        name: httpd
        state: started

    - name: Enable Apache server
      service:
        name: httpd
        enabled: yes

    - name: Install Git
      yum:
        name: git
        state: present

    - name: Clone Netflix project repository
      git:
        repo: "https://github.com/CleverProgrammers/pwj-netflix-clone.git"
        dest: "/var/www/html"
